<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phishing Detector - by Saket</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: #1a1a2e;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #eee;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      color: #e94560;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .built-by {
      text-align: center;
      font-size: 12px;
      color: #555;
      margin-bottom: 30px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #ddd;
      font-size: 13px;
      padding: 12px;
      box-sizing: border-box;
      resize: vertical;
      font-family: 'Segoe UI', Arial, sans-serif;
      line-height: 1.6;
    }

    textarea:focus {
      outline: none;
      border-color: #e94560;
    }

    textarea::placeholder { color: #444; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .scan-btn {
      flex: 1;
      padding: 11px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .scan-btn:hover { background: #c73652; }

    .clear-btn {
      padding: 11px 18px;
      background: #16213e;
      color: #888;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .clear-btn:hover { background: #1e2a4a; }

    .examples {
      margin-top: 12px;
      font-size: 12px;
      color: #555;
    }

    .ex-btn {
      background: transparent;
      border: 1px solid #333;
      color: #777;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      margin-left: 6px;
    }

    .ex-btn:hover { border-color: #e94560; color: #e94560; }

    /* results */
    #results { margin-top: 24px; display: none; }

    .verdict {
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 18px;
      text-align: center;
    }

    .verdict h2 { margin: 0 0 6px; font-size: 20px; }
    .verdict p  { margin: 0; font-size: 13px; opacity: 0.8; }

    .danger  { background: #2d0a0a; border: 1px solid #e94560; color: #ff6b6b; }
    .warning { background: #2d1a00; border: 1px solid #ff9500; color: #ffb347; }
    .caution { background: #2d2a00; border: 1px solid #ffd700; color: #ffd700; }
    .good    { background: #0a2d0a; border: 1px solid #28a745; color: #5cb85c; }

    .score-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }

    .bar-bg {
      background: #16213e;
      border-radius: 6px;
      height: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    .flags-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 10px;
    }

    .flag-card {
      background: #16213e;
      border-left: 3px solid #e94560;
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .flag-name {
      font-size: 14px;
      font-weight: bold;
      color: #e94560;
      margin-bottom: 8px;
    }

    .triggered-line {
      background: #0f1626;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
      font-family: monospace;
    }

    .highlight { color: #e94560; font-weight: bold; }

    .safe-msg {
      text-align: center;
      color: #5cb85c;
      background: #0a2d0a;
      border: 1px solid #28a745;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
    }

    .tips {
      margin-top: 20px;
      background: #16213e;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 13px;
      color: #777;
      line-height: 2;
    }

    .tips strong { color: #aaa; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="container">

  <h1>🛡️ Phishing Email Detector</h1>
  <p class="subtitle">Paste an email and I'll tell you if it looks sketchy.</p>
  <p class="built-by">Built by Saket</p>

  <textarea id="emailBox" placeholder="Paste the email content here..."></textarea>

  <div class="btn-row">
    <button class="scan-btn" onclick="scanEmail()">Scan This Email</button>
    <button class="clear-btn" onclick="clearAll()">Clear</button>
  </div>

  <div class="examples">
    Try an example:
    <button class="ex-btn" onclick="loadExample('phishing')">🚨 Phishing</button>
    <button class="ex-btn" onclick="loadExample('safe')">✅ Safe</button>
  </div>

  <div id="results"></div>

</div>

<script>

  // words and phrases that show up a lot in phishing emails
  // i grouped them by what type of trick they're using
  const rules = [
    {
      name: "Urgency & Pressure",
      phrases: ["urgent", "act now", "immediately", "within 24 hours", "expires", "limited time"]
    },
    {
      name: "Threats",
      phrases: ["will be suspended", "will be deleted", "account terminated", "unauthorized access", "suspicious activity"]
    },
    {
      name: "Sketchy Link Requests",
      phrases: ["click here", "confirm your account", "verify your identity", "login to verify", "update your billing"]
    },
    {
      name: "Asking for Personal Info",
      phrases: ["credit card", "password", "social security", "bank account", "date of birth", "provide your"]
    },
    {
      name: "Pretending to be a Brand",
      phrases: ["paypal", "apple", "microsoft", "amazon", "google", "irs", "netflix", "your bank"]
    },
    {
      name: "Suspicious Links",
      phrases: ["http://", ".xyz", ".ru", "secure-login", "verify-account", "update-billing"]
    }
  ];

  function scanEmail() {
    const text = document.getElementById("emailBox").value.trim();
    if (!text) { alert("paste an email first!"); return; }

    const lines = text.split("\n");
    let findings = [];
    let score = 0;

    for (let rule of rules) {
      let hits = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].toLowerCase().trim();
        if (!line) continue;

        for (let phrase of rule.phrases) {
          if (line.includes(phrase)) {
            hits.push({ num: i + 1, text: lines[i], phrase });
            break;
          }
        }
      }

      if (hits.length > 0) {
        findings.push({ name: rule.name, hits });
        score += 18;
      }
    }

    score = Math.min(score, 100);
    showResults(score, findings);
  }

  function showResults(score, findings) {
    let cssClass, emoji, title, sub;

    if (score >= 55) {
      cssClass = "danger";
      emoji = "🚨"; title = "High Risk";
      sub = "This is almost definitely a phishing email. Don't click anything.";
    } else if (score >= 30) {
      cssClass = "warning";
      emoji = "⚠️"; title = "Looks Suspicious";
      sub = "Something feels off about this one. Be careful.";
    } else if (score >= 18) {
      cssClass = "caution";
      emoji = "🔍"; title = "Minor Concerns";
      sub = "A couple things stood out but it might be fine.";
    } else {
      cssClass = "good";
      emoji = "✅"; title = "Looks Safe";
      sub = "Nothing suspicious found.";
    }

    const barColor = score >= 55 ? "#e94560" : score >= 30 ? "#ff9500" : score >= 18 ? "#ffd700" : "#28a745";

    let html = `
      <div class="verdict ${cssClass}">
        <h2>${emoji} ${title}</h2>
        <p>${sub}</p>
      </div>
      <div class="score-row">
        <span>Threat score</span>
        <span><strong>${score} / 100</strong></span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${score}%; background:${barColor}"></div>
      </div>
    `;

    if (findings.length === 0) {
      html += `<div class="safe-msg">✓ No red flags found in this email.</div>`;
    } else {
      html += `<div class="flags-title">Red Flags (${findings.length})</div>`;
      for (let f of findings) {
        html += `<div class="flag-card"><div class="flag-name">⚑ ${f.name}</div>`;
        for (let h of f.hits) {
          const highlighted = h.text.replace(
            new RegExp(`(${h.phrase})`, "gi"),
            `<span class="highlight">$1</span>`
          );
          html += `<div class="triggered-line">line ${h.num}: ${highlighted}</div>`;
          html += `<div style="font-size:11px;color:#555;padding:2px 10px;">matched: "${h.phrase}"</div>`;
        }
        html += `</div>`;
      }
    }

    html += `
      <div class="tips">
        <strong>A few things to keep in mind:</strong>
        → Never click links in suspicious emails, go to the site directly.<br>
        → Real companies won't ask for your password over email.<br>
        → Check the actual sender address, not just the display name.<br>
        → If something feels wrong, it probably is.
      </div>
    `;

    const r = document.getElementById("results");
    r.innerHTML = html;
    r.style.display = "block";
  }

  function clearAll() {
    document.getElementById("emailBox").value = "";
    const r = document.getElementById("results");
    r.innerHTML = "";
    r.style.display = "none";
  }

  const examples = {
    phishing: `Subject: Urgent - Your Apple ID Has Been Locked

Dear Valued Customer,

We detected unauthorized access on your Apple ID account.
Your account will be suspended within 24 hours unless you act now.

Click here to verify your identity and update your billing information:
http://apple-secure-login.verify-account.xyz/login

Please provide your full name, password, and credit card number
to restore access immediately.

Apple Support Team`,

    safe: `Hi Sarah,

Just following up on our meeting from Tuesday.
I've attached the Q3 report you asked for.

Let me know if you have any questions!

Best,
Mike`
  };

  function loadExample(type) {
    document.getElementById("emailBox").value = examples[type];
    const r = document.getElementById("results");
    r.innerHTML = "";
    r.style.display = "none";
  }

</script>
</body>
</html>
